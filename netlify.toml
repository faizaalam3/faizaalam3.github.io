# netlify.toml for a static site with email functionality via Netlify Forms

[build]
  # No build step needed for static HTML, CSS, and JS
  publish = "."

[[redirects]]
  from = "/contact"
  to = "/section/contacts/contacts.html"
  status = 200
  force = true

[[redirects]]
  from = "/thank-you"
  to = "/section/contacts/thank-you.html"
  status = 200
  force = true

# Netlify form settings (no special config needed for email handling)
